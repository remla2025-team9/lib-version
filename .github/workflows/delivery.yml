name: Delivery

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: get_ver
        run: |
          VER=$(grep -oP '__version__ = "\K[^"]+' lib_version/version.py)
          echo "ver=$VER" >> $GITHUB_OUTPUT

      - name: Compute next prerelease
        id: compute
        run: |
          BASE=${{ steps.get_ver.outputs.ver%%-* }}
          IFS='.' read M N P <<<"$BASE"
          NEXT="$M.$N.$((P+1))-pre"
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Write and commit bump
        run: |
          git checkout main
          sed -E "s/^__version__ = \".*\"/__version__ = \"${{ steps.compute.outputs.next }}\"/" \
            lib_version/version.py > tmp && mv tmp lib_version/version.py
          git add lib_version/version.py
          git commit -m "chore: bump to ${{ steps.compute.outputs.next }} [skip ci]"
          git push origin main

      - name: Tag and push
        run: |
          git tag "v${{ steps.compute.outputs.next }}"
          git push origin "v${{ steps.compute.outputs.next }}"
