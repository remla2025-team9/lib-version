name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"

      - name: Read released version
        id: get_ver
        run: |
          pip install setuptools_scm
          VERSION=$(python -c "from setuptools_scm import get_version; print(get_version())")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump to pre-release
        run: |
          BASE=$(echo "${{ steps.get_ver.outputs.version }}" | cut -d- -f1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          NEXT="$MAJOR.$MINOR.$((PATCH+1))-pre"

          sed -E "s/__version__ = \".*\"/__version__ = \"$NEXT\"/" lib_version/version.py > tmp
          mv tmp lib_version/version.py

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib_version/version.py
          git commit -m "chore: bump to $NEXT [skip ci]"
          git push origin HEAD:meta

      - name: Cleanup
        if: always()
        run: git reset --hard HEAD~1 || true
